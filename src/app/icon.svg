<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Scene Builder icon</title>
  <desc id="desc">An English study card with ABC letters, a sentence line, a pencil, and a check mark for sentence building practice.</desc>
  <defs>
    <linearGradient id="card" x1="100" x2="420" y1="72" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFDF7"/>
      <stop offset="1" stop-color="#EEF4EF"/>
    </linearGradient>
    <linearGradient id="pencil" x1="118" x2="386" y1="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2C14E"/>
      <stop offset="0.7" stop-color="#D86E35"/>
    </linearGradient>
    <filter id="shadow" x="56" y="40" width="408" height="424" color-interpolation-filters="sRGB" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" flood-color="#1F2520" flood-opacity="0.16" stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#F7F5EF"/>
  <circle cx="396" cy="112" r="56" fill="#F2C14E"/>
  <path d="M86 406C126 354 168 334 224 348C280 362 312 392 426 366V438H86V406Z" fill="#DCE9DF"/>

  <g filter="url(#shadow)">
    <rect x="98" y="72" width="316" height="348" rx="40" fill="url(#card)" stroke="#1F2520" stroke-width="12"/>

    <g aria-label="English subject badge">
      <rect x="132" y="108" width="104" height="52" rx="18" fill="#1F6F5B"/>
      <text x="184" y="143" fill="#FFFDF7" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="800" letter-spacing="1" text-anchor="middle">EN</text>
    </g>

    <g aria-label="ABC learning blocks">
      <rect x="132" y="188" width="66" height="60" rx="14" fill="#1F6F5B"/>
      <rect x="222" y="188" width="66" height="60" rx="14" fill="#F2C14E"/>
      <rect x="312" y="188" width="66" height="60" rx="14" fill="#184B7A"/>
      <text x="165" y="230" fill="#FFFDF7" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" text-anchor="middle">A</text>
      <text x="255" y="230" fill="#7A4E16" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" text-anchor="middle">B</text>
      <text x="345" y="230" fill="#FFFDF7" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800" text-anchor="middle">C</text>
    </g>

    <g aria-label="sentence practice line">
      <rect x="132" y="282" width="248" height="40" rx="20" fill="#FFFDF7" stroke="#D8D5CB" stroke-width="5"/>
      <text x="256" y="309" fill="#1F2520" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" text-anchor="middle">I can say it.</text>
      <path d="M146 344H278" stroke="#D8D5CB" stroke-linecap="round" stroke-width="14"/>
      <path d="M146 372H230" stroke="#D8D5CB" stroke-linecap="round" stroke-width="14"/>
    </g>

    <g aria-label="review check mark">
      <circle cx="348" cy="344" r="38" fill="#1F6F5B"/>
      <path d="M329 345L342 358L369 326" fill="none" stroke="#FFFDF7" stroke-linecap="round" stroke-linejoin="round" stroke-width="12"/>
    </g>
  </g>

  <g aria-label="study pencil">
    <path d="M128 414L348 414L386 390L348 366L128 366Z" fill="url(#pencil)" stroke="#1F2520" stroke-linejoin="round" stroke-width="10"/>
    <path d="M348 366L386 390L348 414Z" fill="#FFFDF7" stroke="#1F2520" stroke-linejoin="round" stroke-width="10"/>
    <path d="M384 390L402 390" stroke="#1F2520" stroke-linecap="round" stroke-width="12"/>
    <path d="M158 366V414" stroke="#7A4E16" stroke-linecap="round" stroke-width="8"/>
  </g>
</svg>
