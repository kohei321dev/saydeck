<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="920" viewBox="0 0 1440 920" role="img" aria-labelledby="title desc">
  <title id="title">Scene Builder Auth And Access Flow</title>
  <desc id="desc">GitHub OAuth, owner login, non-owner denied route, and local development bypass access paths.</desc>
  <defs>
    <style>
      .bg{fill:#f7f8fb}
      .box{fill:#ffffff;stroke:#273142;stroke-width:2;rx:8}
      .blue{fill:#eef5ff;stroke:#2563eb;stroke-width:2;rx:8}
      .green{fill:#ecfdf5;stroke:#047857;stroke-width:2;rx:8}
      .red{fill:#fff1f2;stroke:#be123c;stroke-width:2;rx:8}
      .amber{fill:#fff7e6;stroke:#a16207;stroke-width:2;rx:8}
      .title{font-family:Arial, sans-serif;font-size:30px;font-weight:700;fill:#111827}
      .h{font-family:Arial, sans-serif;font-size:20px;font-weight:700;fill:#111827}
      .t{font-family:Arial, sans-serif;font-size:16px;fill:#1f2937}
      .s{font-family:Arial, sans-serif;font-size:13px;fill:#4b5563}
      .mono{font-family:Consolas, monospace;font-size:13px;fill:#374151}
      .arrow{stroke:#273142;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .no{stroke:#be123c;stroke-width:2.5;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      .label{fill:#ffffff;stroke:#cbd5e1;stroke-width:1;rx:5}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#273142"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="920"/>
  <text class="title" x="48" y="60">Auth And Access Flow</text>
  <text class="t" x="48" y="90">利用ユーザー ID による owner 窓口、それ以外の SSO 手段、local server 確認経路</text>

  <rect class="box" x="70" y="180" width="200" height="120"/>
  <text class="h" x="100" y="220">Browser</text>
  <text class="s" x="100" y="250">access /</text>
  <text class="s" x="100" y="272">Scene Builder UI</text>

  <rect class="amber" x="360" y="150" width="250" height="150"/>
  <text class="h" x="390" y="190">Auth configured?</text>
  <text class="mono" x="390" y="220">AUTH_SECRET</text>
  <text class="mono" x="390" y="242">GITHUB_CLIENT_ID</text>
  <text class="mono" x="390" y="264">GITHUB_CLIENT_SECRET</text>

  <rect class="red" x="700" y="80" width="240" height="105"/>
  <text class="h" x="730" y="120">Setup missing</text>
  <text class="mono" x="730" y="148">/signin?setup=1</text>

  <rect class="blue" x="700" y="245" width="240" height="125"/>
  <text class="h" x="730" y="285">NextAuth</text>
  <text class="mono" x="730" y="313">/api/auth/*</text>
  <text class="s" x="730" y="338">JWT session strategy</text>

  <rect class="box" x="1030" y="245" width="250" height="125"/>
  <text class="h" x="1060" y="285">GitHub OAuth</text>
  <text class="s" x="1060" y="313">external SSO provider</text>
  <text class="mono" x="1060" y="338">callback /api/auth/callback/github</text>

  <rect class="amber" x="700" y="455" width="260" height="130"/>
  <text class="h" x="730" y="495">Owner check</text>
  <text class="mono" x="730" y="523">profile.login == GITHUB_OWNER</text>
  <text class="s" x="730" y="550">sets token.role = owner</text>

  <rect class="green" x="1040" y="450" width="230" height="145"/>
  <text class="h" x="1070" y="490">Owner access</text>
  <text class="s" x="1070" y="518">use practice app</text>
  <text class="s" x="1070" y="540">AI review</text>
  <text class="s" x="1070" y="562">card generation</text>
  <text class="s" x="1070" y="584">Neon-backed writes</text>

  <rect class="red" x="700" y="660" width="260" height="120"/>
  <text class="h" x="730" y="700">Not owner</text>
  <text class="mono" x="730" y="728">/denied</text>
  <text class="s" x="730" y="752">valid SSO, rejected app role</text>

  <rect class="green" x="70" y="520" width="260" height="155"/>
  <text class="h" x="100" y="560">Local dev bypass</text>
  <text class="mono" x="100" y="590">DEV_AUTH_BYPASS=1</text>
  <text class="mono" x="100" y="612">npm run dev</text>
  <text class="s" x="100" y="642">enabled only when</text>
  <text class="mono" x="100" y="664">NODE_ENV != production</text>

  <rect class="box" x="385" y="540" width="220" height="115"/>
  <text class="h" x="415" y="580">Dev owner session</text>
  <text class="mono" x="415" y="608">@GITHUB_OWNER dev</text>
  <text class="s" x="415" y="632">local UI verification</text>

  <rect class="amber" x="1040" y="665" width="260" height="130"/>
  <text class="h" x="1070" y="705">Other SSO means</text>
  <text class="s" x="1070" y="733">currently not configured</text>
  <text class="s" x="1070" y="755">provider list only includes</text>
  <text class="mono" x="1070" y="777">GitHubProvider</text>

  <path class="arrow" d="M270 240 H360"/>
  <path class="no" d="M610 200 H700"/>
  <rect class="label" x="640" y="170" width="42" height="26"/>
  <text class="s" x="651" y="188">no</text>

  <path class="arrow" d="M610 260 H700"/>
  <rect class="label" x="638" y="230" width="46" height="26"/>
  <text class="s" x="649" y="248">yes</text>

  <path class="arrow" d="M940 308 H1030"/>
  <path class="arrow" d="M1030 338 H940"/>
  <rect class="label" x="965" y="270" width="42" height="26"/>
  <text class="s" x="976" y="288">SSO</text>

  <path class="arrow" d="M820 370 V455"/>
  <path class="arrow" d="M960 520 H1040"/>
  <rect class="label" x="990" y="490" width="50" height="26"/>
  <text class="s" x="1000" y="508">match</text>

  <path class="no" d="M830 585 V660"/>
  <rect class="label" x="850" y="610" width="70" height="26"/>
  <text class="s" x="861" y="628">no match</text>

  <path class="dash" d="M200 300 V520"/>
  <path class="dash" d="M330 598 H385"/>
  <path class="dash" d="M605 598 C740 620 875 590 1040 560"/>

  <path class="dash" d="M960 735 H1040"/>
  <text class="s" x="48" y="860">[判断] GitHub 以外の SSO を追加する場合は、provider 追加だけでなく role 判定、callback URL、secret、denied policy を同じ変更で更新する。</text>
</svg>
